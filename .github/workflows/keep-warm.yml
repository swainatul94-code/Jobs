name: Keep Render awake

# Pings the health endpoint every 10 minutes so the free Render service never
# crosses its 15-minute idle timeout (10 min absorbs GitHub cron drift).
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          URL="${PING_URL:-https://job-tracker-erjh.onrender.com/api/health}"
          echo "Pinging $URL"
          curl -fsS --max-time 60 --retry 3 --retry-delay 5 "$URL" && echo "" && echo "OK"
        env:
          PING_URL: ${{ vars.PING_URL }}
